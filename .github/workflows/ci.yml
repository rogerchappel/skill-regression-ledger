name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - release-candidate/skill-regression-ledger

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: npm run check
      - run: npm run build
      - run: npm run smoke
